---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mongodb
  namespace: jobrecon
spec:
  interval: 30m
  chart:
    spec:
      chart: mongodb
      version: "16.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    image:
      registry: docker.io
      repository: bitnami/mongodb
      tag: latest
    architecture: standalone
    auth:
      enabled: true
      existingSecret: jobrecon-infra-secrets
      databases:
        - jobrecon
      usernames:
        - jobrecon
    persistence:
      enabled: true
      storageClass: longhorn
      size: 5Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
