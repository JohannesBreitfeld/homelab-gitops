---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qdrant
  namespace: jobrecon
spec:
  interval: 30m
  chart:
    spec:
      chart: qdrant
      version: "0.x"
      sourceRef:
        kind: HelmRepository
        name: qdrant
        namespace: flux-system
  values:
    replicaCount: 1
    persistence:
      storageClassName: longhorn
      size: 5Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
