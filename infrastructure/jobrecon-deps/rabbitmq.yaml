---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rabbitmq
  namespace: jobrecon
spec:
  interval: 30m
  chart:
    spec:
      chart: rabbitmq
      version: "15.x"
      sourceRef:
        kind: HelmRepository
        name: bitnami
        namespace: flux-system
  values:
    image:
      registry: docker.io
      repository: bitnamilegacy/rabbitmq
      tag: latest
    auth:
      username: jobrecon
      existingPasswordSecret: jobrecon-infra-secrets
      existingSecretPasswordKey: rabbitmq-password
    persistence:
      enabled: true
      storageClass: longhorn
      size: 2Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
