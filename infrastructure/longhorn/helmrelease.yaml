---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.8.x"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: flux-system
      interval: 12h
  values:
    # Default settings for homelab
    defaultSettings:
      # Number of replicas for volumes (2 for homelab - 3 nodes)
      defaultReplicaCount: 2
      # Allow scheduling on all nodes
      taintToleration: ""
      # Backup target (optional - configure S3/NFS later)
      backupTarget: ""
      # Upgrade checker
      upgradeChecker: false
      # Reduce CPU reservation for homelab
      guaranteedInstanceManagerCPU: 5

    # Longhorn UI ingress (disabled by default)
    ingress:
      enabled: false
      # To enable later, set to true and configure:
      # host: longhorn.homelab.local
      # tls: true
      # tlsSecret: longhorn-tls
      # annotations:
      #   cert-manager.io/cluster-issuer: letsencrypt-staging

    # Resource limits
    longhornManager:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    longhornDriver:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi

    longhornUI:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
